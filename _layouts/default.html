<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="/images/jy.ico">
    <title>{% if page.title %}{{ page.title }} | Juan Yurquina{% else %}Juan Yurquina{% endif %}</title>
    {% seo %}
    <script>
        if (localStorage.getItem('darkMode') === 'true') document.documentElement.classList.add('dark');
    </script>
</head>
<body>
    <header>
        <div class="container" style="padding: 2%; padding-bottom: 0%;">
            <div class="header-title-row">
                <h1><a href="/" style="text-decoration:none; color:inherit;">Juan E. Yurquina</a></h1>
                <button id="dark-toggle" onclick="toggleDark()" aria-label="Toggle dark mode">🌙</button>
            </div>
            <nav>
                <a href="/">Home</a> &nbsp;/&nbsp;
                <a href="/projects/">Projects</a> &nbsp;/&nbsp;
                <a href="/blog/">Blog</a>
            </nav>
        </div>
    </header>

    {{ content }}

    <footer>
        <div class="container">
            <p>&copy; {{ 'now' | date: "%Y" }} Juan Yurquina</p>
            <img src="/images/argentina-flag-icon.png" alt="argentinian flag" id="hola">
        </div>
    </footer>

    <script>
        function toggleDark() {
            var on = document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', on);
            document.getElementById('dark-toggle').textContent = on ? '☀️' : '🌙';
        }
        if (document.documentElement.classList.contains('dark'))
            document.getElementById('dark-toggle').textContent = '☀️';
    </script>
</body>
</html>
